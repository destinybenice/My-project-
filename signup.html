<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration | Dr. Destiny Benice</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f1f8e9 0%, #ffffff 100%);
            min-height: 100vh;
        }
        #signup-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #2e7d32;
        }
        .form-card h2 {
            color: #1b5e20;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #455a64;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfd8dc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #2e7d32;
            outline: none;
            box-shadow: 0 0 5px rgba(46,125,50,0.2);
        }
        .btn-submit {
            width: 100%;
            background-color: #2e7d32;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(46, 125, 50, 0.2);
        }
    </style>
</head>
<body>

    <nav>
        <h1 style="color: #2e7d32;">Dr. Destiny Benice</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>

    <div id="signup-container">
        <div class="form-card">
            <h2>Create Account</h2>
            <p style="color: #666; margin-bottom: 25px; font-size: 0.95rem;">Join the patient portal to track your upcoming visits.</p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="submitBtn" class="btn-submit">Register Patient Account</button>
            </form>
            <p style="margin-top: 20px; font-size: 0.9rem; color: #555;">Already have an account? <a href="login.html" style="color: #2e7d32; font-weight: bold; text-decoration: none;">Log In</a></p>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signupForm');
        const submitButton = document.getElementById('submitBtn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitButton.innerText = "Creating Account...";
            submitButton.disabled = true;

            const url = "https://ckqmwsjbidgoouhkekvi.supabase.co/auth/v1/signup";
            const apiKey = "sb_publishable_HG0ZSaSYB5nsoIjcLeb3nQ_IM1RPDSu";

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'apikey': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.msg || data.message || "Registration failed");
                }

                alert("Account created successfully! You can now log in.");
                window.location.href = "login.html";

            } catch (error) {
                alert("Error: " + error.message);
                submitButton.innerText = "Register Patient Account";
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
